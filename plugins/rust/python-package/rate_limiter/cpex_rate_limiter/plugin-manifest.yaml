description: "Rate limiting by user/tenant/tool — memory (single-process) or Redis (shared across instances)"
author: "ContextForge Contributors"
version: "0.1.1"
kind: "cpex_rate_limiter.rate_limiter.RateLimiterPlugin"
available_hooks:
  - "prompt_pre_fetch"
  - "tool_pre_invoke"
default_configs:
  by_user: "60/m"
  by_tenant: "600/m"
  by_tool: {}
