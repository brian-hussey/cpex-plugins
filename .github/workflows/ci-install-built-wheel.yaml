name: CI Install Built Wheel

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "plugins/rust/python-package/**"
      - "tests/test_install_built_wheel.py"
      - ".github/workflows/ci-install-built-wheel.yaml"
      - ".github/workflows/release-rust-python-package.yaml"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "plugins/rust/python-package/**"
      - "tests/test_install_built_wheel.py"
      - ".github/workflows/ci-install-built-wheel.yaml"
      - ".github/workflows/release-rust-python-package.yaml"

concurrency:
  group: ci-install-built-wheel-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Run install-built-wheel tests
        run: python3 -m unittest tests/test_install_built_wheel.py

  release-validation:
    if: github.event_name == 'pull_request'
    needs: test
    uses: ./.github/workflows/release-rust-python-package.yaml
    with:
      tag: retry-with-backoff-v0.2.0
      repository: testpypi
      publish_enabled: false
