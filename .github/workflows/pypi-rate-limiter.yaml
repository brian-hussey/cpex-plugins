name: Publish cpex-rate-limiter

on:
  push:
    tags:
      - "rate-limiter-v*"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: rate_limiter

jobs:
  # ---------------------------------------------------------------------------
  # Build wheels for each platform
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64
          - runner: ubuntu-24.04-arm
            platform: linux-aarch64
          - runner: ubuntu-24.04-s390x
            platform: linux-s390x
          - runner: ubuntu-24.04-ppc64le
            platform: linux-ppc64le

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-venv pipx

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maturin
        run: pipx install maturin

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install dist/*.whl pytest pytest-asyncio

      - name: Run tests
        run: .venv/bin/pytest tests/ -v

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: rate_limiter/dist/*.whl

  build-macos:
    name: Build / macos-arm64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          pip install dist/*.whl pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: rate_limiter/dist/*.whl

  build-windows:
    name: Build / windows-x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install wheel and test dependencies
        run: |
          pip install (Get-Item dist/*.whl).FullName pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x86_64
          path: rate_limiter/dist/*.whl

  # ---------------------------------------------------------------------------
  # Build source distribution
  # ---------------------------------------------------------------------------
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install maturin
        run: pipx install maturin

      - name: Build sdist
        run: maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: rate_limiter/dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish to Test PyPI (manual dispatch only)
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to Test PyPI
    needs: [build-linux, build-macos, build-windows, sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          verbose: true

  # ---------------------------------------------------------------------------
  # Publish to PyPI (tagged release only)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-windows, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/rate-limiter-v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
